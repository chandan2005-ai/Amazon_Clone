<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="amazon.css">
    <title>Document</title>
</head>
<body>
    <header>
        <div class="navbar">
            <div class="nav-logoborder">
                <div class="logo"></div>
            </div>
            <div class="Address">
                <p class="address">Deliver to</p>
                <div class="location">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="contry">India</p>
                </div>
            </div>
            <div class="search-bar">
                <button class="all-btn">
                    <!-- <i class="fa-solid fa-bars"></i> -->
                    <!-- <span class="all">All</span> -->
                    <select class="list" name="listbox">
                        <option value="All">All</option>
                        <option value="Alexa & Echo">Alexa & Echo</option>
                        <option value="Amazon Devices">Amazon Devices</option>
                        <option value="Amazon Fashion">Amazon Fashion</option>
                        <option value="Appliances">Appliances</option>
                        <option value="Apps & Games">Apps & Games</option>
                        <option value="Baby">Baby</option>
                        <option value="Beauty & Personal Care">Beauty & Personal Care</option>
                        <option value="Books">Books</option>
                        <option value="Car & Motorbike">Car & Motorbike Toys</option>
                        <option value="Clothing & Accessories">Clothing & Accessories</option>
                        <option value="Collectibles & Fine Art">Collectibles & Fine Art</option>
                        <option value="Computers & Accessories">Computers & Accessories</option>
                        <option value="Deals">Deals</option>
                        <option value="Digital Music">Digital Music</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Garden & Outdoors">Garden & Outdoors</option>
                        <option value="Gift Cards">Gift Cards</option>
                        <option value="Grocery & Gourmet Foods">Grocery & Gourmet Foods</option>
                        <option value="Handmade">Handmade</option>
                        <option value="Health, Household & Baby Care">Health, Household & Baby Care</option>
                        <option value="Home & Kitchen">Home & Kitchen</option>
                        <option value="Industrial & Scientific">Industrial & Scientific</option>
                        <option value="Jewellery">Jewellery</option>
                        <option value="Kindle Store">Kindle Store</option>
                        <option value="Luggage & Bags">Luggage & Bags</option>
                        <option value="Movies, Music & Games">Movies, Music & Games</option>
                        <option value="Musical Instruments">Musical Instruments</option>
                        <option value="Office Products">Office Products</option>
                        <option value="Pet Supplies">Pet Supplies</option>
                        <option value="Prime Video">Prime Video</option>
                        <option value="Software">Software</option>
                        <option value="Sports, Fitness & Outdoors">Sports, Fitness & Outdoors</option>
                        <option value="Tools & Home Improvement">Tools & Home Improvement</option>
                    </select>
                </button>
                <input type="text" class="search-input" placeholder="Search Amazon.in">
                <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            <div class="language">
                <div class="flag"></div>
                <select class="country" name:"listbox">
                    <option value="EN">EN</option>
                    <option value="HI">HI</option>
                    <option value="BN">BN</option>
                    <option value="TE">TE</option>
                    <option value="MR">MR</option>
                    <option value="TA">TA</option>
                    <option value="UR">UR</option>
                    <option value="ML">ML</option>
                    <option value="KN">KN</option>
                    <option value="GU">GU</option>
                    <option value="OR">OR</option>
                    <option value="PA">PA</option>
                </select>
            </div>
            <div class="account">
                <p class="hello">Hello, Sign in</p>
                <p class="account-list">Account & Lists</p>
            </div>
            <div class="returns">
                <p class="returns1">Returns</p>
                <p class="returns2">& Orders</p>
            </div>
            <div class="cart">
                <i id="tray" class="fa-solid fa-cart-shopping"></i>
                <p class="cart-text">Cart</p>
            </div>
        </div>
    </header>
</body>
</html>
